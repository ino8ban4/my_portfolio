apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "express-api-chart.fullname" . }}
  labels:
    {{- include "express-api-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "express-api-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.port }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
