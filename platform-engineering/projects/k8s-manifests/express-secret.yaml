apiVersion: v1
kind: Secret
metadata:
  name: express-secret
type: Opaque
data:
  # Base64エンコードされた値
  # 実際の値: postgres
  DB_USER: cG9zdGdyZXM=
  # 実際の値: password123
  DB_PASSWORD: cGFzc3dvcmQxMjM=
  # 実際の値: myapp_db
  DB_NAME: bXlhcHBfZGI=
stringData:
  # こちらは平文で書ける（applyすると自動的にBase64変換される）
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
