apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-api
  labels:
    app: express-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-api
  template:
    metadata:
      labels:
        app: express-api
    spec:
      containers:
      - name: express
        image: express-api:v1
        imagePullPolicy: Never  # ローカルイメージ使用（重要！）
        ports:
        - containerPort: 3000
        env:
        # ConfigMapから環境変数を取得
          - name: APP_NAME
            valueFrom:
             configMapKeyRef:
               name: express-config
               key: APP_NAME
          - name: LOG_LEVEL
            valueFrom:
             configMapKeyRef:
               name: express-config
               key: LOG_LEVEL
          - name: NODE_ENV
            valueFrom:
             configMapKeyRef:
               name: express-config
               key: NODE_ENV
         # Secretから環境変数を取得
          - name: DB_USER
            valueFrom:
             secretKeyRef:
               name: express-secret
               key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
             secretKeyRef:
               name: express-secret
               key: DB_PASSWORD
          - name: DB_HOST
            valueFrom:
             secretKeyRef:
               name: express-secret
               key: DB_HOST
