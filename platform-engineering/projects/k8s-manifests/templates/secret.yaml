# ============================================================
# Secret Template
# ============================================================
# 用途: 機密情報を保存（パスワード、APIキー、証明書等）
# 必須フィールド: metadata.name, type, data or stringData
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: <SECRET_NAME>  # Secret名（例: db-credentials, api-keys）

# Secretタイプ
type: Opaque  # Opaque | kubernetes.io/tls | kubernetes.io/dockerconfigjson

# --- データ形式1: data（Base64エンコード済み） ---
data:
  # Base64エンコード済みの値
  # 例: echo -n "password123" | base64
  DB_PASSWORD: cGFzc3dvcmQxMjM=
  API_KEY: YXBpa2V5MTIzNDU2

# --- データ形式2: stringData（平文） ---
# apply時に自動的にBase64変換される
stringData:
  DB_USER: "postgres"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  
  # 複数行のデータ（証明書等）
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIDXTCCAkWgAwIBAgIJAKJ...
    -----END CERTIFICATE-----

# ============================================================
# data vs stringData:
#
# data:
#   - Base64エンコード済みの値を記述
#   - GitHubにpushしても値が見えにくい（暗号化ではない！）
#   - デコード: echo "cGFzc3dvcmQxMjM=" | base64 -d
#
# stringData:
#   - 平文で記述（わかりやすい）
#   - apply時に自動的にBase64変換
#   - Gitにpushしてはいけない（.gitignore必須）
#
# ============================================================
# 使用方法:
#
# 方法1: 全てのキーを環境変数として一括取得
# Deployment:
#   envFrom:
#   - secretRef:
#       name: <SECRET_NAME>
#
# 方法2: 特定のキーのみ環境変数として取得
# Deployment:
#   env:
#   - name: DB_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: <SECRET_NAME>
#         key: DB_PASSWORD
#
# 方法3: ファイルとしてマウント
# Deployment:
#   volumeMounts:
#   - name: secret-volume
#     mountPath: /etc/secrets
#   volumes:
#   - name: secret-volume
#     secret:
#       secretName: <SECRET_NAME>
#
# ============================================================
# セキュリティベストプラクティス:
# - SecretのYAMLファイルはGitにpushしない（.gitignore追加）
# - 本番環境では外部シークレット管理ツール使用推奨:
#   - AWS Secrets Manager
#   - HashiCorp Vault
#   - Sealed Secrets（暗号化してGit管理可能）
#   - External Secrets Operator
# - 環境変数よりVolumeマウントの方が安全
# - RBACでSecret閲覧権限を制限
#
# ============================================================
# Secretタイプ:
#
# Opaque:
#   汎用タイプ（デフォルト）
#
# kubernetes.io/tls:
#   TLS証明書用（tls.crt, tls.keyが必須）
#
# kubernetes.io/dockerconfigjson:
#   プライベートDockerレジストリ認証用
#
# ============================================================
# 置換項目:
#   <SECRET_NAME> : Secret名
# ============================================================
